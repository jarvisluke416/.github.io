<center></center>
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Memory Game with Hidden Background</title>

<style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      width: 100%;
    }

    #game-board {
      position: relative;
      width: 100vw;
      height: 100vh;
      background-size: cover;
      background-position: center;
    }
  
   .card {
      position: absolute;
      width: 2vw;
      height: 5vh;
      transform-style: preserve-3d;
      transition: transform 0.5s, opacity 0.5s;
      cursor: pointer;
      background-color: red;
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    .card.removed {
      opacity: 0;
      pointer-events: none;
    }

    .card-inner {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      font-weight: bold;
      backface-visibility: hidden;
      border: 1px solid #999;
      background-color: transparent;
    }

    .card-front {
      transform: rotateY(0deg);
      background-color:transparent;
      text-shadow: 0 0 3px rgba(0,0,0,0.3);
    }

</style>
</head>

<body>

<div id="game-board"
</div>

<script>
const gameBoard = document.getElementById("game-board");

const COLS = 50;
const ROWS = 20;
const CARD_WIDTH = 2;
const CARD_HEIGHT = 5;

// SYMBOLS
const baseSymbols = [];
for (let i = 0; i < 500; i++) {
  baseSymbols.push(String.fromCharCode(0x2600 + (i % 256)));
}

const fullDeck = [...baseSymbols, ...baseSymbols];

// SHUFFLE
for (let i = fullDeck.length - 1; i > 0; i--) {
  const j = Math.floor(Math.random() * (i + 1));
  [fullDeck[i], fullDeck[j]] = [fullDeck[j], fullDeck[i]];
}

// COLORS
const colors = ["#046307", "#d4af37", "#EAF2F8"];
const symbolColors = {};

baseSymbols.forEach(symbol => {
  const color = colors[Math.floor(Math.random() * colors.length)];
  symbolColors[symbol] = color;
});


  // MAP SYMBOL → LINK
const symbolInfo = {};

baseSymbols.forEach((symbol, i) => {
  symbolInfo[symbol] = {
    title: "Symbol #" + (i + 1),
    description: "This symbol (" + symbol + ") is part of your memory board."
  };
});

let flippedCards = [];
const cards = [];

// CREATE CARDS
fullDeck.forEach((symbol, index) => {
  const card = document.createElement("div");
  card.className = "card";
  card.dataset.symbol = symbol;

  const row = Math.floor(index / COLS);
  const col = index % COLS;

  card.style.left = `${col * CARD_WIDTH}vw`;
  card.style.top = `${row * CARD_HEIGHT}vh`;

  const color = symbolColors[symbol];

  card.innerHTML = `
    <div class="card-inner card-back"></div>
    <div class="card-inner card-front" style="color:${color}">
      ${symbol}
    </div>
  `;

  card.addEventListener("click", (e) => {
    e.stopPropagation();

    if (
      card.classList.contains("flipped") ||
      card.classList.contains("removed") ||
      flippedCards.length === 2
    ) return;

    card.classList.add("flipped");
    flippedCards.push(card);

    if (flippedCards.length === 2) {
      const [first, second] = flippedCards;

      if (first.dataset.symbol === second.dataset.symbol) {
        const link = symbolLinkMap[first.dataset.symbol];

        setTimeout(() => {
          first.classList.add("removed");
          second.classList.add("removed");
          flippedCards = [];

          if (link && link.trim() !== "") {
            window.open(link, "_blank");
          }

        }, 500);

      } else {
        setTimeout(() => {
          first.classList.remove("flipped");
          second.classList.remove("flipped");
          flippedCards = [];
        }, 800);
      }
    }
  });

  cards.push(card);
  gameBoard.appendChild(card);
});

// CHEAT
window.addEventListener("keydown", (e) => {
  if (e.ctrlKey && e.key === "v") {
    const temp = [];

    cards.forEach(card => {
      if (!card.classList.contains("flipped") && !card.classList.contains("removed")) {
        card.classList.add("flipped");
        temp.push(card);
      }
    });

    setTimeout(() => {
      temp.forEach(card => card.classList.remove("flipped"));
    }, 10000);
  }
});
</script>
 

</body>
</html>
