// MAP SYMBOL → LINK
const symbolLinkMap = {};
baseSymbols.forEach((symbol, i) => {
  symbolLinkMap[symbol] = symbolLinks[i] || "";
});

let flippedCards = [];
const cards = [];

// CREATE CARDS
fullDeck.forEach((symbol, index) => {
  const card = document.createElement("div");
  card.className = "card";
  card.dataset.symbol = symbol;

  const row = Math.floor(index / COLS);
  const col = index % COLS;

  card.style.left = `${col * CARD_WIDTH}vw`;
  card.style.top = `${row * CARD_HEIGHT}vh`;

  const color = symbolColors[symbol];

  card.innerHTML = `
    <div class="card-inner card-back"></div>
    <div class="card-inner card-front" style="color:${color}">
      ${symbol}
    </div>
  `;

  card.addEventListener("click", (e) => {
    e.stopPropagation();

    if (
      card.classList.contains("flipped") ||
      card.classList.contains("removed") ||
      flippedCards.length === 2
    ) return;

    card.classList.add("flipped");
    flippedCards.push(card);

    if (flippedCards.length === 2) {
      const [first, second] = flippedCards;

      if (first.dataset.symbol === second.dataset.symbol) {
        const link = symbolLinkMap[first.dataset.symbol];

        setTimeout(() => {
          first.classList.add("removed");
          second.classList.add("removed");
          flippedCards = [];

          if (link && link.trim() !== "") {
            window.open(link, "_blank");
          }

        }, 500);

      } else {
        setTimeout(() => {
          first.classList.remove("flipped");
          second.classList.remove("flipped");
          flippedCards = [];
        }, 800);
      }
    }
  });

  cards.push(card);
  gameBoard.appendChild(card);
});

// CHEAT
window.addEventListener("keydown", (e) => {
  if (e.ctrlKey && e.key === "v") {
    const temp = [];

    cards.forEach(card => {
      if (!card.classList.contains("flipped") && !card.classList.contains("removed")) {
        card.classList.add("flipped");
        temp.push(card);
      }
    });

    setTimeout(() => {
      temp.forEach(card => card.classList.remove("flipped"));
    }, 10000);
  }
});
